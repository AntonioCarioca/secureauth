name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create clean package
        run: |
          mkdir -p dist
          zip -r "dist/colorgrid-v${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "dist/*"

      - name: Upload package to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: colorgrid-v${{ steps.version.outputs.version }}
          path: dist/colorgrid-v${{ steps.version.outputs.version }}.zip

      - name: Upload package to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/colorgrid-v${{ steps.version.outputs.version }}.zip